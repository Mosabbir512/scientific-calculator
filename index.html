<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="calculator">
        <div class="header">
            <h1>🔬 Scientific Calculator</h1>
            <div class="history-toggle" onclick="toggleHistory()">📜 History</div>
        </div>

        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span>History</span>
                <button onclick="clearHistory()">Clear All</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="buttons">
            <!-- Row 1: Scientific Functions -->
            <button class="sci-btn" onclick="appendValue('Math.sin(')">sin</button>
            <button class="sci-btn" onclick="appendValue('Math.cos(')">cos</button>
            <button class="sci-btn" onclick="appendValue('Math.tan(')">tan</button>
            <button class="sci-btn" onclick="appendValue('Math.log(')">log</button>
            <button class="sci-btn" onclick="appendValue('Math.ln(')">ln</button>
            <button class="sci-btn" onclick="appendValue('Math.sqrt(')">√</button>

            <!-- Row 2: Advanced Functions -->
            <button class="sci-btn" onclick="appendValue('Math.asin(')">sin⁻¹</button>
            <button class="sci-btn" onclick="appendValue('Math.acos(')">cos⁻¹</button>
            <button class="sci-btn" onclick="appendValue('Math.atan(')">tan⁻¹</button>
            <button class="sci-btn" onclick="appendValue('**')">x^y</button>
            <button class="sci-btn" onclick="appendValue('Math.PI')">π</button>
            <button class="sci-btn" onclick="appendValue('Math.E')">e</button>

            <!-- Row 3: Memory & Constants -->
            <button class="sci-btn" onclick="appendValue('Math.abs(')">|x|</button>
            <button class="sci-btn" onclick="appendValue('Math.exp(')">e^x</button>
            <button class="sci-btn" onclick="appendValue('Math.pow(10,')">10^x</button>
            <button class="sci-btn" onclick="appendValue('Math.factorial(')">x!</button>
            <button class="sci-btn" onclick="appendValue('Math.round(')">round</button>
            <button class="sci-btn" onclick="appendValue('Math.floor(')">floor</button>

            <!-- Row 4: Basic Operations -->
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('/')">÷</button>
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">×</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">−</button>
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>
            <button onclick="appendValue('0')" class="zero">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button onclick="calculate()" class="equals">=</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
